<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Timer - Coding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100 flex justify-center">
<!-- Mobile Container -->
<div class="w-full max-w-md h-screen relative flex flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Top App Bar -->
<header class="flex items-center p-4 pb-2 justify-between z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Coding</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-[24px]">more_vert</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center w-full px-6 relative z-10">
<!-- Glow Effect Behind Timer -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary/20 rounded-full blur-[80px] -z-10"></div>
<!-- Big Timer Display -->
<div class="text-slate-900 dark:text-white tracking-tighter text-[56px] font-extrabold leading-tight text-center mb-8 tabular-nums">
                02:15:43
            </div>
<!-- Timer Units Breakdown -->
<div class="flex gap-4 w-full mb-10">
<div class="flex grow basis-0 flex-col items-stretch gap-3">
<div class="flex h-20 grow items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-700 shadow-sm backdrop-blur-sm">
<p class="text-slate-900 dark:text-white text-3xl font-bold leading-tight tracking-[-0.015em] tabular-nums">02</p>
</div>
<div class="flex items-center justify-center">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">Hours</p>
</div>
</div>
<div class="flex grow basis-0 flex-col items-stretch gap-3">
<div class="flex h-20 grow items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-700 shadow-sm backdrop-blur-sm">
<p class="text-slate-900 dark:text-white text-3xl font-bold leading-tight tracking-[-0.015em] tabular-nums">15</p>
</div>
<div class="flex items-center justify-center">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">Minutes</p>
</div>
</div>
<div class="flex grow basis-0 flex-col items-stretch gap-3">
<div class="flex h-20 grow items-center justify-center rounded-xl bg-primary/20 border border-primary/30 shadow-[0_0_15px_-3px_rgba(19,236,91,0.2)] backdrop-blur-sm">
<p class="text-primary text-3xl font-bold leading-tight tracking-[-0.015em] tabular-nums">43</p>
</div>
<div class="flex items-center justify-center">
<p class="text-primary text-xs font-medium uppercase tracking-wider">Seconds</p>
</div>
</div>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pb-8 text-center uppercase tracking-widest">Focused Session</p>
<!-- Add Photo Button -->
<div class="flex justify-center mb-12">
<button class="flex items-center justify-center rounded-full h-12 px-6 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-900 dark:text-white gap-2 text-sm font-bold transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]">add_a_photo</span>
<span>Add Photo</span>
</button>
</div>
<!-- Controls (Pause / Stop) -->
<div class="flex items-center gap-6 w-full justify-center">
<button class="flex flex-col items-center gap-2 group">
<div class="size-16 rounded-full bg-red-500/10 flex items-center justify-center border border-red-500/20 group-hover:bg-red-500/20 transition-colors">
<div class="size-6 bg-red-500 rounded-sm"></div>
</div>
<span class="text-xs font-bold text-red-500 uppercase tracking-wider">Stop</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="size-24 rounded-full bg-primary text-slate-900 flex items-center justify-center shadow-[0_0_20px_-5px_#13ec5b] group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[48px] fill-current">pause</span>
</div>
<span class="text-xs font-bold text-primary uppercase tracking-wider">Pause</span>
</button>
</div>
</main>
<!-- Bottom Decoration / Safe Area -->
<div class="h-6 w-full"></div>
</div>
</body></html>
